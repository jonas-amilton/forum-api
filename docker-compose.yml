services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
      POSTGRES_DB: forum
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forum']
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://forum:forum@db:5432/forum
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  db_data:
