services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
      POSTGRES_DB: forum
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://forum:forum@db:5432/forum
    ports:
      - '3000:3000'
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  db_data:
